<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidate Login</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#b30000,#0044cc,#008000);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:#fff;
padding:30px;
border-radius:15px;
width:90%;
max-width:380px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
text-align:center;
}

h2{ color:#b30000; }

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#b30000;
color:#fff;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

button:hover{ background:#900000; }

a{
display:block;
margin-top:12px;
text-decoration:none;
color:#0044cc;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="login-box">

<h2>Candidate Login</h2>

<input type="email" id="loginEmail" placeholder="Enter Email">
<input type="password" id="loginPassword" placeholder="Enter Password">

<button onclick="candidateLogin()">Login</button>

<a onclick="resetPassword()">Forgot Password?</a>
<a href="register.html">New User? Register</a>
<a href="index.html">⬅ Back Home</a>

</div>

<!-- FIREBASE -->
<script type="module" src="firebase.js"></script>
<script defer src="script.js"></script>

<script>


window.resetPassword = function () {

  const email = document.getElementById("loginEmail").value.trim();

  if (!email) {
    alert("Please enter your registered email first.");
    return;
  }

  if (!window.sendPasswordResetEmail) {
    alert("System not ready. Please refresh page.");
    return;
  }

  window.sendPasswordResetEmail(window.auth, email)
  .then(() => {
    alert("Password reset link sent.\nCheck Inbox + Spam folder.");
  })
  .catch((error) => {
    alert(error.message);
  });

};

</script>

</body>
</html>
