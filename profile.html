<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidate Profile Card</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#001f4d,#003366,#0d1b2a);
    overflow:hidden;
    padding:20px;
}

/* TOP PROFILE */

.top-profile{
    position:fixed;
    top:15px;
    left:15px;
    z-index:9999;
    display:flex;
    align-items:center;
    gap:10px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(10px);
    padding:8px 14px;
    border-radius:50px;
    border:1px solid rgba(255,255,255,0.2);
}

.top-profile img{
    width:45px;
    height:45px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #fff;
}

.top-profile span{
    color:#fff;
    font-weight:600;
    font-size:15px;
}

/* Background Glow */

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:radial-gradient(circle,#00c3ff55,transparent 70%);
    top:-100px;
    left:-100px;
}

body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:radial-gradient(circle,#ff006655,transparent 70%);
    bottom:-100px;
    right:-100px;
}

/* Profile Card */

.profile-card{
    width:360px;
    padding:30px 25px;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:
        0 15px 35px rgba(0,0,0,0.4),
        inset 0 0 10px rgba(255,255,255,0.1);
    text-align:center;
    position:relative;
    overflow:hidden;
    animation:floatCard 4s ease-in-out infinite;
}

/* Animated Border */

.profile-card::before{
    content:"";
    position:absolute;
    inset:-3px;
    border-radius:30px;
    background:linear-gradient(
        45deg,
        #00f0ff,
        #ff00ea,
        #00ff99,
        #ffd500
    );
    z-index:-1;
    animation:borderMove 5s linear infinite;
    background-size:300% 300%;
}

@keyframes borderMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

@keyframes floatCard{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-10px);
    }
}

/* Profile Image */

.profile-img{
    width:150px;
    height:150px;
    border-radius:50%;
    border:5px solid #fff;
    object-fit:cover;
    box-shadow:
        0 0 25px #00c3ff,
        0 0 45px #ff00ea;
    transition:0.5s;
}

.profile-img:hover{
    transform:scale(1.08) rotate(3deg);
}

/* Upload Box */

.upload-photo-box{
    cursor:pointer;
    display:inline-block;
}

/* Candidate Name */

.name{
    margin-top:20px;
    font-size:34px;
    font-weight:700;
    letter-spacing:1px;
    background:linear-gradient(45deg,#00f0ff,#ff00ea,#ffd500);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:
        0 4px 15px rgba(0,0,0,0.3);
}

/* Role */

.role{
    color:#ddd;
    margin-top:8px;
    font-size:17px;
    letter-spacing:1px;
}

/* Email */

.email{
    color:#fff;
    margin-top:10px;
    font-size:15px;
    word-break:break-word;
}

/* Change Name Button */

.edit-btn{
    margin-top:18px;
    padding:12px 22px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,#00c3ff,#ff00ea);
    color:#fff;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.edit-btn:hover{
    transform:scale(1.05);
}

/* Stats */

.stats{
    display:flex;
    justify-content:space-between;
    margin-top:30px;
    gap:10px;
}

.stat-box{
    flex:1;
    background:rgba(255,255,255,0.08);
    padding:15px 10px;
    border-radius:18px;
    transition:0.4s;
    border:1px solid rgba(255,255,255,0.1);
}

.stat-box:hover{
    transform:translateY(-8px);
    background:rgba(255,255,255,0.15);
}

.stat-number{
    font-size:24px;
    font-weight:700;
    color:#fff;
}

.stat-label{
    color:#ccc;
    font-size:13px;
    margin-top:5px;
}

/* Buttons */

.btn-group{
    margin-top:30px;
    display:flex;
    gap:15px;
}

.btn{
    flex:1;
    padding:13px;
    border:none;
    border-radius:50px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:0.4s;
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:center;
}

.dashboard-btn{
    background:linear-gradient(45deg,#00c3ff,#0066ff);
    color:#fff;
    box-shadow:0 5px 15px rgba(0,195,255,0.4);
}

.logout-btn{
    background:linear-gradient(45deg,#ff0066,#ff4d00);
    color:#fff;
    box-shadow:0 5px 15px rgba(255,0,102,0.4);
}

.btn:hover{
    transform:scale(1.05);
}

/* Views */

.views{
    margin-top:25px;
    color:#fff;
    font-size:16px;
    background:rgba(255,255,255,0.08);
    padding:12px;
    border-radius:15px;
    border:1px solid rgba(255,255,255,0.1);
}

.views span{
    color:#00f0ff;
    font-weight:700;
    font-size:22px;
}

</style>
</head>

<body>

<!-- TOP PROFILE -->

<div class="top-profile">

    <img src="/gdsnotes/icon-192.png"
         id="topProfilePhoto">

    <span id="topProfileName">
        Candidate
    </span>

</div>

<div class="profile-card">

    <!-- Upload Profile Photo -->

    <label for="photoUpload" class="upload-photo-box">

        <img src="/gdsnotes/icon-192.png"
             class="profile-img"
             id="profileImage">

    </label>

    <input type="file"
           id="photoUpload"
           accept="image/*"
           hidden>

    <!-- Candidate Name -->

    <h1 class="name"
        id="candidateName">
        Loading...
    </h1>

    <!-- Role -->

    <p class="role">
        GDS Departmental Exam Candidate
    </p>

    <!-- Email -->

    <p class="email"
       id="candidateEmail">
       Loading...
    </p>

    <!-- Change Name -->

    <button type="button"
            class="edit-btn"
            id="changeNameBtn">

        Change Name

    </button>

    <!-- Stats -->

    <div class="stats">

        <div class="stat-box">
            <div class="stat-number"
                 id="userCount">0</div>

            <div class="stat-label">
                Users
            </div>
        </div>

        <div class="stat-box">
            <div class="stat-number">
                98%
            </div>

            <div class="stat-label">
                Accuracy
            </div>
        </div>

        <div class="stat-box">
            <div class="stat-number">
                1st
            </div>

            <div class="stat-label">
                Rank
            </div>
        </div>

    </div>

    <!-- Buttons -->

    <div class="btn-group">

        <a href="/gdsnotes/dashboard.html"
           class="btn dashboard-btn">

           Dashboard

        </a>

        <button class="btn logout-btn"
                id="logoutBtn">

            Logout

        </button>

    </div>

    <!-- Views -->

    <div class="views">

        Total Views :
        <span id="viewCount">0</span>

    </div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getAuth,
    onAuthStateChanged,
    signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
    getFirestore,
    doc,
    getDoc,
    setDoc,
    collection,
    getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

    apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",

    authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",

    projectId: "gds-departmental-exam-studyhub",

    storageBucket: "gds-departmental-exam-studyhub.appspot.com",

    messagingSenderId: "759916756080",

    appId: "1:759916756080:web:7f2c0e66458bd007e888b5"

};

/* INIT */

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

/* VIEW COUNTER */

let views = localStorage.getItem("profileViews");

if(!views){

    views = 1;

}else{

    views = parseInt(views) + 1;

}

localStorage.setItem(
    "profileViews",
    views
);

document.getElementById(
    "viewCount"
).innerText = views;

/* LOAD USER */

onAuthStateChanged(auth, async(user)=>{

    if(user){

        const userRef =
        doc(db,"candidates",user.uid);

        const snap =
        await getDoc(userRef);

        let finalName =
        user.email.split("@")[0];

        let finalPhoto =
        "/gdsnotes/icon-192.png";

        if(snap.exists()){

            const data =
            snap.data();

            finalName =
            data.name || finalName;

            finalPhoto =
            data.photo || finalPhoto;

        }else{

            await setDoc(userRef,{
                name:finalName,
                email:user.email,
                photo:finalPhoto
            });

        }

        document.getElementById(
            "candidateName"
        ).innerText = finalName;

        document.getElementById(
            "candidateEmail"
        ).innerText = user.email;

        document.getElementById(
            "profileImage"
        ).src = finalPhoto;

        document.getElementById(
            "topProfilePhoto"
        ).src = finalPhoto;

        document.getElementById(
            "topProfileName"
        ).innerText = finalName;

        localStorage.setItem(
            "candidateName",
            finalName
        );

        localStorage.setItem(
            "candidatePhoto",
            finalPhoto
        );

    }else{

        window.location.href =
        "/gdsnotes/login.html";

    }

});

/* CHANGE NAME */

document
.getElementById("changeNameBtn")
.addEventListener("click",
async()=>{

    const user =
    auth.currentUser;

    if(!user){

        alert("Please Login");

        return;
    }

    const newName =
    prompt("Enter Candidate Name");

    if(newName &&
       newName.trim() !== ""){

        const photo =
        document.getElementById(
            "profileImage"
        ).src;

        await setDoc(
            doc(db,"candidates",user.uid),
            {
                name:newName,
                email:user.email,
                photo:photo
            }
        );

        document.getElementById(
            "candidateName"
        ).innerText = newName;

        document.getElementById(
            "topProfileName"
        ).innerText = newName;

        localStorage.setItem(
            "candidateName",
            newName
        );

        alert("Name Updated");

    }

});

/* PHOTO UPLOAD */

document
.getElementById("photoUpload")
.addEventListener("change",
async(e)=>{

    const file =
    e.target.files[0];

    if(!file) return;

    const reader =
    new FileReader();

    reader.onload =
    async function(ev){

        const photoURL =
        ev.target.result;

        document.getElementById(
            "profileImage"
        ).src = photoURL;

        document.getElementById(
            "topProfilePhoto"
        ).src = photoURL;

        localStorage.setItem(
            "candidatePhoto",
            photoURL
        );

        const user =
        auth.currentUser;

        if(user){

            await setDoc(
                doc(db,"candidates",user.uid),
                {
                    name:document.getElementById(
                        "candidateName"
                    ).innerText,

                    email:user.email,

                    photo:photoURL
                }
            );

            alert("Photo Updated");

        }

    };

    reader.readAsDataURL(file);

});

/* LOGOUT */

document
.getElementById("logoutBtn")
.addEventListener("click",
async()=>{

    await signOut(auth);

    localStorage.removeItem(
        "candidateName"
    );

    localStorage.removeItem(
        "candidatePhoto"
    );

    window.location.href =
    "/gdsnotes/login.html";

});

/* USER COUNT */

async function loadUserCount(){

    const querySnapshot =
    await getDocs(
        collection(db,"candidates")
    );

    document.getElementById(
        "userCount"
    ).innerText =
    querySnapshot.size;

}

loadUserCount();

</script>

</body>
</html>
