<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>PYQ Hub - Official Study</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --warning: #ff9800; --dark: #2c3e50; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: #f0f2f5; padding: 15px; color: #333; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--dark); margin-bottom: 20px; font-size: 22px; border-bottom: 3px solid var(--primary); padding-bottom: 10px; }
        .selector-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        select, input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
        .status-bar { text-align: center; font-size: 14px; font-weight: bold; margin-bottom: 15px; padding: 8px; border-radius: 5px; display: none; }
        .card { background: #fafafa; border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-top: 15px; }
        .btn { padding: 13px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: #fff; width: 100%; font-size: 16px; margin-top: 8px; }
        .btn-open { background: var(--primary); }
        .btn-start { background: #6f42c1; width: 100%; margin-top: 15px; }
        .option { display: block; width: 100%; text-align: left; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; }
        .correct { background: #d4edda !important; border-color: #28a745 !important; font-weight: bold; }
        .wrong { background: #f8d7da !important; border-color: #dc3545 !important; }
        .btn-row { display: flex; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Previous Year Questions</h1>

    <div class="selector-grid">
        <select id="yearSelect">
            <option value="">वर्ष चुनें</option>
            <option>PYQ 2020</option>
            <option>PYQ 2021</option>
            <option>PYQ 2022</option>
            <option>PYQ 2023</option>
            <option>PYQ 2024</option>
            <option>PYQ 2025</option>
            <option>PYQ 2026</option>
            <option>Model Paper</option>
            <option>Practice Set</option>
        </select>
        <select id="postSelect">
            <option value="">पोस्ट चुनें</option>
            <option>MTS</option><option>POSTMAN</option><option>PA-SA</option>
        </select>
    </div>

    <div id="statusBox" class="status-bar"></div>

    <div class="card" id="pdfSection">
        <button class="btn btn-open" id="openPdfBtn">Open PDF</button>
    </div>

    <button class="btn btn-start" id="startQuizBtn">Start MCQ Practice</button>
    
    <div id="quizDisplay" style="display:none; margin-top:20px;"></div>
    <div id="resultBox" style="display:none; margin-top:20px; text-align:center;" class="card"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
        authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
        projectId: "gds-departmental-exam-studyhub",
        storageBucket: "gds-departmental-exam-studyhub.appspot.com",
        messagingSenderId: "759916756080",
        appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const BACKEND_URL = "https://payment-backend-2-g6go.onrender.com";

    let allQuestions = [];
    let currentIdx = 0;
    let score = 0;
    let quizHistory = {}; 

    async function fetchQuestions() {
        const year = document.getElementById("yearSelect").value;
        const post = document.getElementById("postSelect").value;
        const status = document.getElementById("statusBox");
        if (!year || !post) return;

        status.style.display = "block";
        status.style.background = "#e1f5fe";
        status.innerHTML = "लोड हो रहा है...";

        try {
            const q = query(collection(db, "pyqQuestions"), where("category", "==", year), where("post", "==", post));
            const querySnapshot = await getDocs(q);
            allQuestions = [];
            querySnapshot.forEach((doc) => { allQuestions.push({ id: doc.id, ...doc.data() }); });

            if (allQuestions.length > 0) {
                status.style.background = "#d4edda";
                status.innerHTML = `✅ ${allQuestions.length} सवाल मिले!`;
            } else {
                status.style.background = "#fff3cd";
                status.innerHTML = "❌ डेटा नहीं मिला।";
            }
        } catch (error) { status.innerHTML = "⚠️ Error loading data."; }
    }

    window.renderQuiz = function() {
        const quizDisplay = document.getElementById("quizDisplay");
        const q = allQuestions[currentIdx];
        const options = q.options || []; 
        const correct = q.answer;

        quizDisplay.innerHTML = `
            <div class="card">
                <span style="color:red; font-weight:bold;">प्रश्न: ${currentIdx + 1} / ${allQuestions.length}</span>
                <p style="margin:15px 0; font-weight:bold;">${q.question}</p>
                <div id="optArea">
                    ${options.map((opt, i) => `
                        <button class="option" onclick="window.checkAns(this, \`${opt}\`, \`${correct}\`)">
                            ${String.fromCharCode(65+i)}. ${opt}
                        </button>
                    `).join('')}
                </div>
                <div class="btn-row">
                    <button class="btn" style="background:#6c757d; flex:1; ${currentIdx===0?'display:none':''}" onclick="window.nav(-1)">Previous</button>
                    ${currentIdx === allQuestions.length - 1 
                        ? `<button class="btn" style="background:var(--success); flex:1;" onclick="window.showFinal()">Submit Result</button>` 
                        : `<button class="btn" style="background:var(--dark); flex:1;" onclick="window.nav(1)">Next</button>`
                    }
                </div>
            </div>
        `;

        if(quizHistory[currentIdx]) {
            const btns = document.querySelectorAll('.option');
            btns.forEach(b => {
                b.disabled = true;
                if(b.innerText.includes(quizHistory[currentIdx].selected)) b.classList.add(quizHistory[currentIdx].isCorrect ? 'correct' : 'wrong');
                if(b.innerText.includes(correct)) b.classList.add('correct');
            });
        }
    };

    window.checkAns = function(btn, selected, correct) {
        const btns = document.querySelectorAll('.option');
        btns.forEach(b => b.disabled = true);
        const isCorrect = (selected === correct);
        if(isCorrect) { btn.classList.add('correct'); score++; }
        else { btn.classList.add('wrong'); btns.forEach(b => { if(b.innerText.includes(correct)) b.classList.add('correct'); }); }
        quizHistory[currentIdx] = { selected, isCorrect };
    };

    window.nav = function(dir) {
        currentIdx += dir;
        window.renderQuiz();
    };

    window.showFinal = function() {
        document.getElementById("quizDisplay").style.display = "none";
        const rb = document.getElementById("resultBox");
        rb.style.display = "block";
        rb.innerHTML = `<h3>📊 Your Final Score</h3><p style="font-size:35px; color:#007bff; margin:15px 0;">${score} / ${allQuestions.length}</p>
                        <button class="btn" style="background:var(--primary); width:100%;" onclick="location.reload()">Restart Quiz</button>`;
    };

    document.getElementById("openPdfBtn").onclick = () => {
        const year = document.getElementById("yearSelect").value;
        const post = document.getElementById("postSelect").value;
        if(!year || !post) return alert("Pehle Year aur Post select karein!");
        const url = `${BACKEND_URL}/get-pdf?year=${encodeURIComponent(year)}&post=${encodeURIComponent(post)}`;
        window.open(url, "_blank");
    };

    document.getElementById("yearSelect").onchange = fetchQuestions;
    document.getElementById("postSelect").onchange = fetchQuestions;
    document.getElementById("startQuizBtn").onclick = () => {
        if(allQuestions.length === 0) return alert("Pehle Year aur Post select karke load hone dein!");
        document.getElementById("pdfSection").style.display = "none";
        document.getElementById("startQuizBtn").style.display = "none";
        document.getElementById("quizDisplay").style.display = "block";
        window.renderQuiz();
    };
</script>
</body>
</html>
