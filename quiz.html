<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Mock Test - Official Study</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --dark: #2c3e50; --danger: #dc3545; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: #f0f2f5; padding: 15px; color: #333; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .timer-box { background: var(--danger); color: white; padding: 8px 15px; border-radius: 8px; font-weight: bold; font-family: monospace; font-size: 18px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .subject-card { background: #fafafa; border: 2px solid #ddd; padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; cursor: pointer; transition: 0.3s; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        .subject-card:hover { border-color: var(--primary); background: #eef7ff; }
        .option { display: block; width: 100%; text-align: left; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; }
        .correct { background: #d4edda !important; border-color: #28a745 !important; }
        .wrong { background: #f8d7da !important; border-color: #dc3545 !important; }
        .hide { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-nav">
        <button onclick="location.href='candidate-dashboard.html'" style="padding:8px; border-radius:8px; border:none; background:var(--dark); color:white; cursor:pointer;">⬅ Back</button>
        <div class="timer-box" id="timer">30:00</div>
    </div>

    <div id="subjectBox">
        <h2 style="text-align:center; margin-bottom:15px;">Select Subject</h2>
        <div class="grid">
            <div class="subject-card" onclick="startQuiz('POSTAL MANUAL VOLUME 7')">VOL 7</div>
            <div class="subject-card" onclick="startQuiz('GK')">GK</div>
            <div class="subject-card" onclick="startQuiz('Maths')">Maths</div>
            <div class="subject-card" onclick="startQuiz('Post Office Guide 1')">PO Guide 1</div>
        </div>
    </div>

    <div id="quizBox" class="hide">
        <div id="progress" style="font-weight:bold; color:red; margin-bottom:10px;"></div>
        <div id="question" style="font-weight:bold; font-size:18px; margin-bottom:15px;"></div>
        <div id="options"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn" style="flex:1; padding:10px; background:#6c757d; color:white; border:none; border-radius:8px;" onclick="prevQ()">Previous</button>
            <button id="nextBtn" style="flex:1; padding:10px; background:var(--dark); color:white; border:none; border-radius:8px;" onclick="nextQ()">Next</button>
            <button id="submitBtn" class="hide" style="flex:1; padding:10px; background:var(--success); color:white; border:none; border-radius:8px;" onclick="submitQuiz()">Submit</button>
        </div>
    </div>

    <div id="resultArea" class="hide" style="text-align:center;">
        <h3>Your Score</h3>
        <div id="resultScore" style="font-size:40px; color:var(--primary); font-weight:bold;"></div>
        <button onclick="location.reload()" style="width:100%; padding:12px; margin-top:15px; border-radius:8px; border:none; background:var(--primary); color:white;">Restart</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
        authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
        projectId: "gds-departmental-exam-studyhub",
        storageBucket: "gds-departmental-exam-studyhub.appspot.com",
        messagingSenderId: "759916756080",
        appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let questions = [];
    let current = 0;
    let answers = {};
    let submitted = false;

    window.startQuiz = async function(sub) {
        const qy = query(collection(db, "quizQuestions"), where("subject", "==", sub));
        const snap = await getDocs(qy);
        questions = snap.docs.map(doc => doc.data());
        
        if(questions.length > 0) {
            document.getElementById("subjectBox").classList.add("hide");
            document.getElementById("quizBox").classList.remove("hide");
            render();
        } else {
            alert("No questions found for this subject.");
        }
    };

    function render() {
        let q = questions[current];
        document.getElementById("progress").innerText = `Q: ${current + 1} / ${questions.length}`;
        document.getElementById("question").innerText = q.question;
        
        let html = "";
        q.options.forEach(op => {
            let cls = "option";
            if (submitted) {
                if (op === q.answer) cls += " correct";
                else if (answers[current] === op) cls += " wrong";
            }
            html += `<div class="${cls}" onclick="saveAns('${op.replace(/'/g, "\\'")}')">${op}</div>`;
        });
        document.getElementById("options").innerHTML = html;
        
        document.getElementById("nextBtn").classList.toggle("hide", current === questions.length - 1);
        document.getElementById("submitBtn").classList.toggle("hide", current !== questions.length - 1 || submitted);
    }

    window.saveAns = (v) => { if(!submitted) { answers[current] = v; render(); } };
    window.nextQ = () => { if(current < questions.length-1) { current++; render(); } };
    window.prevQ = () => { if(current > 0) { current--; render(); } };
    window.submitQuiz = () => {
        submitted = true;
        let score = 0;
        questions.forEach((q, i) => { if(answers[i] === q.answer) score++; });
        document.getElementById("quizBox").classList.add("hide");
        document.getElementById("resultArea").classList.remove("hide");
        document.getElementById("resultScore").innerText = `${score} / ${questions.length}`;
    };

    document.addEventListener("contextmenu", e => e.preventDefault());
</script>
</body>
</html>
