<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidate Register</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0044cc,#b30000,#008000);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.box{
background:#fff;
padding:30px;
border-radius:15px;
width:100%;
max-width:420px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
text-align:center;
}

h2{
color:#b30000;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#008000;
color:#fff;
border:none;
border-radius:8px;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#006600;
}

a{
display:block;
margin-top:12px;
text-decoration:none;
color:#0044cc;
font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
<h2>Candidate Register</h2>

<input type="text" id="name" placeholder="Full Name">
<input type="text" id="mobile" placeholder="Mobile Number">
<input type="email" id="email" placeholder="Email Address">
<input type="password" id="password" placeholder="Create Password">
<!-- PROFILE PHOTO UPLOAD -->
<input type="file"
id="profilePhoto"
accept="image/*">

<!-- IMAGE PREVIEW -->
<img id="previewPhoto"
src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
style="
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
margin-top:10px;
border:3px solid #ccc;
">
<button type="button" onclick="register()">Register Now</button>

<a href="login.html">Already have account? Login</a>
<a href="index.html">⬅ Back Home</a>
</div>

<script type="module" src="firebase.js"></script>
<script defer src="script.js"></script>
<script>

/* PHOTO PREVIEW */

document
.getElementById("profilePhoto")
.addEventListener("change", function(e){

const file = e.target.files[0];

if(file){

const reader = new FileReader();

reader.onload = function(event){

document.getElementById(
"previewPhoto"
).src = event.target.result;

}

reader.readAsDataURL(file);

}

});

</script>
</body>
</html>
