<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Candidate Syllabus</title>
<style>
    /* Aapka original CSS */
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
    body{background:#f4f6f9;padding:20px;}
    .container{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,.08);}
    h1{text-align:center;margin-bottom:20px;color:#222;}
    .top-controls{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
    input,select{padding:12px;border:1px solid #ccc;border-radius:8px;font-size:16px;outline:none;width:100%;}
    .card{background:#fafafa;padding:15px;border:1px solid #ddd;border-radius:10px;margin-bottom:12px;}
    .card h3{color:#111;margin-bottom:5px;}
    .category{display:inline-block;padding:4px 10px;background:#007bff;color:#fff;font-size:12px;border-radius:20px;margin-bottom:8px;}
    .file-tag{font-size:12px;color:#d9534f;font-weight:bold;margin:5px 0;}
    .small{font-size:14px;color:#666;margin-top:6px;line-height:1.5;}
    .download-btn{display:inline-block;margin-top:12px;padding:10px 14px;background:#28a745;color:#fff;text-decoration:none;border-radius:8px;font-weight:bold;font-size:14px;cursor:pointer;border:none;}
</style>
</head>
<body>

<div class="container">
    <h1>Candidate Syllabus</h1>
    <div class="top-controls">
        <select id="categoryFilter">
            <option value="All">All Categories</option>
            <option value="MTS">MTS</option>
            <option value="Postman">Postman</option>
            <option value="PA/SA">PA/SA</option>
        </select>
        <input type="text" id="searchBox" placeholder="Search syllabus...">
    </div>
    <div id="list">Loading...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
    authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
    projectId: "gds-departmental-exam-studyhub",
    storageBucket: "gds-departmental-exam-studyhub.appspot.com",
    messagingSenderId: "759916756080",
    appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const list = document.getElementById("list");
const categoryFilter = document.getElementById("categoryFilter");
const searchBox = document.getElementById("searchBox");

const BACKEND_URL = "https://payment-backend-2-g6go.onrender.com";
let allData = [];
let currentUserEmail = "";

onAuthStateChanged(auth, (user) => {
    if (user) {
        currentUserEmail = user.email;
        loadData();
    } else {
        window.location.href = "login.html";
    }
});

async function loadData(){
    try{
        const q = query(collection(db,"syllabus"),orderBy("createdAt","desc"));
        const snap = await getDocs(q);
        allData = [];
        snap.forEach(doc=>{ allData.push({ id: doc.id, ...doc.data() }); });
        renderData();
    }catch(error){
        list.innerHTML = `Error loading data.`;
    }
}

function renderData(){
    const category = categoryFilter.value;
    const search = searchBox.value.toLowerCase().trim();

    let filtered = allData.filter(item=>{
        let catMatch = category === "All" || item.category === category;
        let textMatch = (item.title || "").toLowerCase().includes(search);
        return catMatch && textMatch;
    });

    list.innerHTML = "";
    filtered.forEach(item=>{
        // Admin Panel se aane wala Exact File Name
        let fName = (item.fileName || "").trim();

        // 1. Agar .pdf extension missing hai toh add karo
        if(fName && !fName.toLowerCase().endsWith(".pdf")){
            fName += ".pdf";
        }

        // 2. BACKEND MATCH: 'year' ko small 'syllabus' karke dekho agar capital se nahi chal raha
        // GitHub directory check: backend/pdfs/
        const secureUrl = `${BACKEND_URL}/get-pdf?email=${encodeURIComponent(currentUserEmail)}&year=Syllabus&post=${encodeURIComponent(fName)}`;

        list.innerHTML += `
        <div class="card">
            <h3>${item.title || ""}</h3>
            <div class="category">${item.category || ""}</div>
            <div class="file-tag">📄 File: ${fName}</div>
            <p class="small">${item.desc || ""}</p>
            <button class="download-btn" onclick="window.open('${secureUrl}', '_blank')">
                📄 Open PDF
            </button>
        </div>
        `;
    });
}

categoryFilter.addEventListener("change",renderData);
searchBox.addEventListener("input",renderData);
</script>
</body>
</html>
