<body>

<div class="topbar">
Protected PDF Viewer
</div>

<div class="watermark">
Rameshwar Sahu<br>
GDS Departmental Study Hub
</div>

<div id="pdf-container"></div>

<script>

// ==========================
// GET PDF NAME
// ==========================

const params = new URLSearchParams(window.location.search);

const file = params.get("file");


// ==========================
// RENDER PDF URL
// ==========================

const pdfUrl =
const params =
new URLSearchParams(window.location.search);

const year =
params.get("year");

const post =
params.get("post");

const email =
params.get("email");

const pdfUrl =
`https://payment-backend-2-g6go.onrender.com/get-pdf?email=${encodeURIComponent(email)}&year=${encodeURIComponent(year)}&post=${encodeURIComponent(post)}`;


// ==========================
// Disable Right Click
// ==========================

document.addEventListener("contextmenu", e =>
e.preventDefault());



// ==========================
// Disable Keys
// ==========================

document.addEventListener("keydown", function(e){

    if(
        e.ctrlKey &&
        (
            e.key === "s" ||
            e.key === "p" ||
            e.key === "u"
        )
    ){
        e.preventDefault();
    }

});



// ==========================
// Disable Print
// ==========================

window.print = function(){};



// ==========================
// Load PDF
// ==========================

pdfjsLib.getDocument(pdfUrl).promise.then(async pdf => {

    const container =
    document.getElementById("pdf-container");

    for(let pageNum=1; pageNum<=pdf.numPages; pageNum++){

        const page =
        await pdf.getPage(pageNum);

        const viewport =
        page.getViewport({ scale: 1.5 });

        const canvas =
        document.createElement("canvas");

        const context =
        canvas.getContext("2d");

        canvas.height = viewport.height;

        canvas.width = viewport.width;

        container.appendChild(canvas);

        await page.render({
            canvasContext: context,
            viewport: viewport
        }).promise;

    }

}).catch(err => {

    alert("PDF not found");

    console.log(err);

});



// ==========================
// Screenshot Warning
// ==========================

document.addEventListener("keyup", function(e){

    if(e.key === "PrintScreen"){

        alert("Screenshot Restricted");

        navigator.clipboard.writeText("");

    }

});
// ==========================
// Blur when tab inactive
// ==========================

document.addEventListener("visibilitychange", () => {

    const container =
    document.getElementById("pdf-container");

    if(document.hidden){

        container.style.filter = "blur(20px)";

    } else {

        container.style.filter = "blur(0px)";
    }

});


// ==========================
// Detect DevTools
// ==========================

setInterval(() => {

    if(
        window.outerWidth - window.innerWidth > 160 ||
        window.outerHeight - window.innerHeight > 160
    ){

        document.body.innerHTML = `
            <div style="
                color:white;
                height:100vh;
                display:flex;
                justify-content:center;
                align-items:center;
                font-size:24px;
                background:black;
            ">
                Inspection Blocked
            </div>
        `;
    }

}, 1000);



</script>

</body>
