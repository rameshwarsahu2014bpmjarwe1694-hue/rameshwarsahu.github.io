<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Protected PDF Viewer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>

body{
    margin:0;
    background:#111;
    overflow:hidden;
    font-family:Arial;
}

#pdf-container{
    height:100vh;
    overflow:auto;
    text-align:center;
}

canvas{
    display:block;
    margin:10px auto;
    max-width:100%;
}

.watermark{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) rotate(-30deg);

    font-size:45px;

    color:rgba(255,255,255,0.08);

    z-index:9999;

    pointer-events:none;

    user-select:none;

    text-align:center;
}

.topbar{
    position:fixed;
    top:0;
    width:100%;
    background:#000;
    color:white;
    padding:10px;
    z-index:99999;
    text-align:center;
    font-size:14px;
}

</style>
</head>

<body>

<div class="topbar">
Protected PDF Viewer
</div>

<div class="watermark">
Rameshwar Sahu<br>
GDS Departmental Study Hub
</div>

<div id="pdf-container"></div>

<script>

// ==========================
// GET PDF NAME
// ==========================

const params = new URLSearchParams(window.location.search);

const file = params.get("file");


// ==========================
// RENDER PDF URL
// ==========================

const pdfUrl =
decodeURIComponent(
    new URLSearchParams(window.location.search)
    .get("pdf")
);


// ==========================
// Disable Right Click
// ==========================

document.addEventListener("contextmenu", e =>
e.preventDefault());



// ==========================
// Disable Keys
// ==========================

document.addEventListener("keydown", function(e){

    if(
        e.ctrlKey &&
        (
            e.key === "s" ||
            e.key === "p" ||
            e.key === "u"
        )
    ){
        e.preventDefault();
    }

});



// ==========================
// Disable Print
// ==========================

window.print = function(){};



// ==========================
// Load PDF
// ==========================

pdfjsLib.getDocument(pdfUrl).promise.then(async pdf => {

    const container =
    document.getElementById("pdf-container");

    for(let pageNum=1; pageNum<=pdf.numPages; pageNum++){

        const page =
        await pdf.getPage(pageNum);

        const viewport =
        page.getViewport({ scale: 1.5 });

        const canvas =
        document.createElement("canvas");

        const context =
        canvas.getContext("2d");

        canvas.height = viewport.height;

        canvas.width = viewport.width;

        container.appendChild(canvas);

        await page.render({
            canvasContext: context,
            viewport: viewport
        }).promise;

    }

}).catch(err => {

    alert("PDF not found");

    console.log(err);

});



// ==========================
// Screenshot Warning
// ==========================

document.addEventListener("keyup", function(e){

    if(e.key === "PrintScreen"){

        alert("Screenshot Restricted");

        navigator.clipboard.writeText("");

    }

});
// ==========================
// Blur when tab inactive
// ==========================

document.addEventListener("visibilitychange", () => {

    const container =
    document.getElementById("pdf-container");

    if(document.hidden){

        container.style.filter = "blur(20px)";

    } else {

        container.style.filter = "blur(0px)";
    }

});


// ==========================
// Detect DevTools
// ==========================

setInterval(() => {

    if(
        window.outerWidth - window.innerWidth > 160 ||
        window.outerHeight - window.innerHeight > 160
    ){

        document.body.innerHTML = `
            <div style="
                color:white;
                height:100vh;
                display:flex;
                justify-content:center;
                align-items:center;
                font-size:24px;
                background:black;
            ">
                Inspection Blocked
            </div>
        `;
    }

}, 1000);


// ==========================
// Floating Dynamic Watermark
// ==========================

setInterval(() => {

    const wm =
    document.querySelector(".watermark");

    wm.style.top =
    Math.random() * 80 + "%";

    wm.style.left =
    Math.random() * 80 + "%";

}, 3000);
</script>

</body>
</html>
