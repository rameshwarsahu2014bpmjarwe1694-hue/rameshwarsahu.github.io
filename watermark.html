<!DOCTYPE html>
<html>
<head>
  <title>PDF Watermark</title>
</head>
<body>

<h2>Upload PDF</h2>

<input type="file" id="file" accept="application/pdf"/>
<button onclick="addWatermark()">Add Watermark</button>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<script>
async function addWatermark() {
    const fileInput = document.getElementById("file");
    const file = fileInput.files[0];

    if (!file) {
        alert("Please select a PDF");
        return;
    }

    const arrayBuffer = await file.arrayBuffer();
    const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);

    const pages = pdfDoc.getPages();

    pages.forEach(page => {
    const { width, height } = page.getSize();

    const text = "RAMESHWAR SAHU EXAM APP";

    // 🔥 Repeating watermark (full page protection)
    for (let i = 0; i < width; i += 200) {
        for (let j = 0; j < height; j += 150) {

            page.drawText(text, {
                x: i,
                y: j,
                size: 28,
                opacity: 0.12,
                rotate: PDFLib.degrees(-30),
            });

        }
    }

    // 🔥 Big center watermark
    page.drawText(text, {
        x: width / 2 - 250,
        y: height / 2,
        size: 60,
        opacity: 0.08,
        rotate: PDFLib.degrees(-45),
    });
});

    const pdfBytes = await pdfDoc.save();

    const blob = new Blob([pdfBytes], { type: "application/pdf" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "watermarked.pdf";
    a.click();
}
</script>

</body>
</html>
